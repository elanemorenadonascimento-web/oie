<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOGO DE COBRA DO ENZO</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: #1a1a1a; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; position: relative;
        }
        /* Fundo do Menu */
        #bg-canvas { position: absolute; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        #menu, #game-over-screen, #loja {
            background-color: rgba(45, 45, 45, 0.95); padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; width: 350px;
            border: 1px solid #444;
        }
        #game-over-screen, #loja, #game-container { display: none; }
        
        h1 { color: #ff3e3e; margin: 0 0 15px 0; font-size: 1.6rem; }
        .campo { margin-bottom: 12px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #bbb; }
        select, button, input { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; box-sizing: border-box; }
        input { background: #444; color: white; margin-bottom: 5px; }
        
        button { background-color: #4caf50; color: white; margin-top: 10px; cursor: pointer; }
        .btn-secreto { position: absolute; top: 0; right: 0; width: 45px; height: 45px; background: transparent; border: none; z-index: 100; }
        .btn-lixeira { position: absolute; bottom: 15px; right: 15px; width: 45px; height: 45px; background: #ff3e3e; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem; color: white; }

        .stats-topo { display: flex; justify-content: space-around; width: 360px; margin-bottom: 10px; font-size: 1.3rem; font-weight: bold; }
        #lista-cabecas { max-height: 200px; overflow-y: auto; margin: 10px 0; }
        .item-loja { display: flex; justify-content: space-between; align-items: center; background: #3d3d3d; padding: 10px; margin: 5px 0; border-radius: 8px; }
        .item-loja button { width: auto; margin: 0; padding: 5px 12px; }
        
        canvas#snakeGame { border: 4px solid #333; background: #000; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <button class="btn-secreto" onclick="hack()"></button>
    <button class="btn-lixeira" onclick="resetTotal()">🗑️</button>

    <div id="menu">
        <h1>JOGO DE COBRA DO ENZO</h1>
        <div class="campo">
            <label>Nome do Jogador:</label>
            <input type="text" id="player-name" placeholder="Digite aqui..." maxlength="15">
        </div>
        <div class="campo">
            <label>Tamanho do Mapa:</label>
            <select id="map-size">
                <option value="9">9x9</option>
                <option value="12">12x12</option>
                <option value="20" selected>20x20</option>
            </select>
        </div>
        <div class="campo">
            <label>Cor da Cobra:</label>
            <select id="snake-body-color">
                <option value="red">Vermelho</option>
                <option value="orange">Laranja</option>
                <option value="yellow">Amarelo</option>
                <option value="green" selected>Verde</option>
                <option value="cyan">Ciano</option>
                <option value="blue">Azul</option>
                <option value="purple">Roxo</option>
                <option value="pink">Rosa</option>
                <option value="white">Branco</option>
                <option value="gray">Cinza</option>
            </select>
        </div>
        <div class="campo">
            <label>Velocidade:</label>
            <select id="speed">
                <option value="350">Lenta</option>
                <option value="180" selected>Média</option>
                <option value="80">Rápida</option>
            </select>
        </div>
        <button onclick="configurarEIniciar()">INICIAR</button>
        <button style="background:#2196f3" onclick="abrirLoja()">LOJA</button>
    </div>

    <div id="loja">
        <h2>CABEÇAS (🍎 <span id="loja-saldo">0</span>)</h2>
        <div id="lista-cabecas"></div>
        <button onclick="voltarMenu()" style="background:#666">VOLTAR</button>
    </div>

    <div id="game-over-screen">
        <h2 id="msg-morte">BATEU!</h2>
        <p id="score-atual"></p>
        <button onclick="reiniciar()">JOGAR DE NOVO</button>
        <button onclick="voltarMenu()" style="background:#666">MENU</button>
    </div>

    <div id="game-container">
        <div class="stats-topo">
            <span>🍎 <span id="ingame-score">0</span></span>
            <span>🏆 <span id="ingame-record">0</span></span>
        </div>
        <canvas id="snakeGame"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let hackUsado = false;
        let emJogo = false;

        let dados = JSON.parse(localStorage.getItem('snakeEnzoV5')) || {
            totalMacas: 0, recorde: 0, cabecaAtual: '⚪', cabecasCompradas: ['⚪'], nome: ''
        };
        document.getElementById('player-name').value = dados.nome;

        const cabecasLoja = [
            {id: '⚪', preco: 0}, {id: '🐍', preco: 10}, {id: '🐷', preco: 10}, 
            {id: '🐱', preco: 10}, {id: '🐶', preco: 10}, {id: '🦁', preco: 20}, 
            {id: '🤖', preco: 20}, {id: '👽', preco: 30}, {id: '👑', preco: 40}, {id: '🔥', preco: 50}
        ];

        let cobra, fruta, direcao, placar, loop, tTile, tGrid, velocidade, corCorpo, nomePlayer;

        // --- Lógica do Fundo (Menu) ---
        bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
        let snakesBG = Array(6).fill().map(() => ({
            x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height,
            cor: `hsl(${Math.random()*360}, 70%, 50%)`, angulo: Math.random() * 6
        }));

        function animarFundo() {
            if(emJogo) { bgCtx.clearRect(0,0,bgCanvas.width, bgCanvas.height); return; }
            bgCtx.fillStyle = 'rgba(26, 26, 26, 0.1)';
            bgCtx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
            snakesBG.forEach(s => {
                s.angulo += (Math.random() - 0.5) * 0.2;
                s.x += Math.cos(s.angulo) * 3;
                s.y += Math.sin(s.angulo) * 3;
                if(s.x < -50) s.x = bgCanvas.width + 50; if(s.x > bgCanvas.width + 50) s.x = -50;
                if(s.y < -50) s.y = bgCanvas.height + 50; if(s.y > bgCanvas.height + 50) s.y = -50;
                bgCtx.fillStyle = s.cor;
                bgCtx.beginPath(); bgCtx.arc(s.x, s.y, 8, 0, Math.PI*2); bgCtx.fill();
            });
            requestAnimationFrame(animarFundo);
        }
        animarFundo();

        function salvar() { localStorage.setItem('snakeEnzoV5', JSON.stringify(dados)); }

        function hack() {
            if(!hackUsado) { dados.totalMacas += 1000; alert("HACK: +1000 Maçãs!"); hackUsado = true; salvar(); abrirLoja(); }
        }

        function resetTotal() {
            if(confirm("CERTEZA QUE QUER APAGAR TUDO?")) {
                dados = { totalMacas: 0, recorde: 0, cabecaAtual: '⚪', cabecasCompradas: ['⚪'], nome: '' };
                salvar(); location.reload();
            }
        }

        function abrirLoja() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('loja').style.display = 'block';
            document.getElementById('loja-saldo').innerText = dados.totalMacas;
            const lista = document.getElementById('lista-cabecas');
            lista.innerHTML = '';
            cabecasLoja.forEach(c => {
                const comprou = dados.cabecasCompradas.includes(c.id);
                const sel = dados.cabecaAtual === c.id;
                lista.innerHTML += `<div class="item-loja"><span style="font-size:1.5rem">${c.id}</span>
                <button onclick="comprarCabeça('${c.id}', ${c.preco})" style="background:${sel?'#4caf50':'#2196f3'}">
                ${comprou?(sel?'USANDO':'USAR'):c.preco+'🍎'}</button></div>`;
            });
        }

        function comprarCabeça(id, preco) {
            if(dados.cabecasCompradas.includes(id)) dados.cabecaAtual = id;
            else if(dados.totalMacas >= preco) { dados.totalMacas -= preco; dados.cabecasCompradas.push(id); dados.cabecaAtual = id; }
            salvar(); abrirLoja();
        }

        function configurarEIniciar() {
            nomePlayer = document.getElementById('player-name').value || "Jogador";
            dados.nome = nomePlayer; salvar();
            tGrid = parseInt(document.getElementById('map-size').value);
            velocidade = parseInt(document.getElementById('speed').value);
            corCorpo = document.getElementById('snake-body-color').value;
            tTile = 360 / tGrid;
            canvas.width = canvas.height = 360;
            emJogo = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            reiniciar();
        }

        function reiniciar() {
            document.getElementById('game-over-screen').style.display = 'none';
            cobra = [{x: Math.floor(tGrid/2), y: Math.floor(tGrid/2)}];
            direcao = 'D'; placar = 0;
            document.getElementById('ingame-score').innerText = 0;
            document.getElementById('ingame-record').innerText = dados.recorde;
            criarFruta();
            if(loop) clearInterval(loop);
            loop = setInterval(desenhar, velocidade);
        }

        function criarFruta() {
            fruta = { x: Math.floor(Math.random()*tGrid), y: Math.floor(Math.random()*tGrid) };
            if(cobra.some(p => p.x === fruta.x && p.y === fruta.y)) criarFruta();
        }

        document.addEventListener('keydown', e => {
            if(e.key==='ArrowUp' && direcao!=='B') direcao='C';
            if(e.key==='ArrowDown' && direcao!=='C') direcao='B';
            if(e.key==='ArrowLeft' && direcao!=='D') direcao='E';
            if(e.key==='ArrowRight' && direcao!=='E') direcao='D';
        });

        function desenhar() {
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,360,360);
            ctx.fillStyle = 'red'; ctx.beginPath();
            ctx.arc(fruta.x*tTile+tTile/2, fruta.y*tTile+tTile/2, tTile/2.5, 0, Math.PI*2); ctx.fill();

            let nx = cobra[0].x, ny = cobra[0].y;
            if(direcao==='D') nx++; if(direcao==='E') nx--; if(direcao==='C') ny--; if(direcao==='B') ny++;

            if(nx<0||nx>=tGrid||ny<0||ny>=tGrid||cobra.some(p=>p.x===nx && p.y===ny)) {
                clearInterval(loop);
                dados.totalMacas += placar;
                if(placar > dados.recorde) dados.recorde = placar;
                salvar();
                document.getElementById('score-atual').innerText = `${nomePlayer} fez ${placar} pontos!`;
                document.getElementById('game-over-screen').style.display = 'block';
                return;
            }

            cobra.unshift({x:nx, y:ny});
            if(nx===fruta.x && ny===fruta.y) { placar++; document.getElementById('ingame-score').innerText = placar; criarFruta(); }
            else { cobra.pop(); }

            cobra.forEach((p, i) => {
                if(i===0) {
                    ctx.font = `${tTile}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(dados.cabecaAtual, p.x*tTile+tTile/2, p.y*tTile+tTile/2);
                } else {
                    ctx.fillStyle = corCorpo; ctx.fillRect(p.x*tTile+1, p.y*tTile+1, tTile-2, tTile-2);
                }
            });
        }

        function voltarMenu() { emJogo = false; animarFundo(); document.getElementById('game-container').style.display = 'none'; document.getElementById('game-over-screen').style.display = 'none'; document.getElementById('loja').style.display = 'none'; document.getElementById('menu').style.display = 'block'; }
    </script>
</body>
</html>
