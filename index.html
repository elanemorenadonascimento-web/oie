<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Snake Game Neon</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #050505;
            color: #00ff88;
            font-family: 'Courier New', Courier, monospace;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #00ff88;
            box-shadow: 0 0 20px #00ff88;
            background-color: #000;
        }
        h1 { margin: 10px; text-shadow: 0 0 10px #00ff88; }
        .score { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>SNAKE PYTHON STYLE</h1>
    <div class="score">Pontos: <span id="pontos">0</span></div>
    <canvas id="snake" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snake");
        const ctx = canvas.getContext("2d");
        const pontosDoc = document.getElementById("pontos");
        const box = 20;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let direcao = "RIGHT";
        let comida = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        let pontos = 0;

        // Controles
        document.addEventListener("keydown", (event) => {
            if(event.keyCode == 37 && direcao != "RIGHT") direcao = "LEFT";
            if(event.keyCode == 38 && direcao != "DOWN") direcao = "UP";
            if(event.keyCode == 39 && direcao != "LEFT") direcao = "RIGHT";
            if(event.keyCode == 40 && direcao != "UP") direcao = "DOWN";
        });

        function desenhar() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff88" : "#008844";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#ff0055"; // Cor da comida
            ctx.fillRect(comida.x, comida.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( direcao == "LEFT") snakeX -= box;
            if( direcao == "UP") snakeY -= box;
            if( direcao == "RIGHT") snakeX += box;
            if( direcao == "DOWN") snakeY += box;

            if(snakeX == comida.x && snakeY == comida.y) {
                pontos++;
                pontosDoc.innerHTML = pontos;
                comida = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let novoCabeca = { x: snakeX, y: snakeY };

            // Game Over
            if(snakeX < 0 || snakeX >= 400 || snakeY < 0 || snakeY >= 400 || colidindo(novoCabeca, snake)) {
                clearInterval(jogo);
                alert("GAME OVER! Pontuação: " + pontos);
                location.reload(); // Reinicia o jogo
            }

            snake.unshift(novoCabeca);
        }

        function colidindo(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let jogo = setInterval(desenhar, 100); // Velocidade do jogo
    </script>
</body>
</html>
