<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOGO DE COBRA DO ENZO - PRO</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: #1a1a1a; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        #menu, #game-over-screen, #loja {
            background-color: #2d2d2d; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px;
        }
        #game-over-screen, #loja, #game-container { display: none; }
        h1, h2 { color: #ff3e3e; margin: 0 0 10px 0; }
        .campo { margin-bottom: 12px; text-align: left; }
        select, button { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        button { background-color: #4caf50; color: white; margin-top: 10px; }
        .btn-secreto {
            position: absolute; top: 0; right: 0; width: 40px; height: 40px;
            background: transparent; border: none; cursor: default; z-index: 100;
        }
        .btn-lixeira {
            position: absolute; bottom: 10px; right: 10px; width: 40px; height: 40px;
            background: #ff3e3e; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem;
        }
        .stats-topo { display: flex; justify-content: space-around; width: 100%; margin-bottom: 10px; font-size: 1.2rem; font-weight: bold; }
        .item-loja { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #444; padding: 8px; margin: 5px 0; border-radius: 5px;
        }
        .item-loja button { width: auto; margin: 0; padding: 5px 10px; }
        canvas { border: 4px solid #333; background: #000; }
    </style>
</head>
<body>

    <button class="btn-secreto" onclick="hack()"></button>
    <button class="btn-lixeira" onclick="resetTotal()">🗑️</button>

    <div id="menu">
        <h1>SNAKE ENZO PRO</h1>
        <p>🍎 Maçãs: <span id="total-maca">0</span> | 🏆 Recorde: <span id="recorde">0</span></p>
        
        <div class="campo">
            <label>Tamanho do Mapa:</label>
            <select id="map-size">
                <option value="9">9x9</option>
                <option value="12">12x12</option>
                <option value="20" selected>20x20</option>
            </select>
        </div>
        <div class="campo">
            <label>Cor da Cobra:</label>
            <select id="snake-body-color">
                <option value="#4caf50">Verde</option>
                <option value="#2196f3">Azul</option>
                <option value="#e91e63">Rosa</option>
                <option value="#ffeb3b">Amarela</option>
                <option value="#ffffff">Branca</option>
            </select>
        </div>
        <div class="campo">
            <label>Velocidade:</label>
            <select id="speed">
                <option value="350">Lenta</option>
                <option value="180" selected>Média</option>
                <option value="80">Rápida</option>
            </select>
        </div>
        <button onclick="configurarEIniciar()">JOGAR</button>
        <button style="background:#2196f3" onclick="abrirLoja()">LOJA DE CABEÇAS</button>
    </div>

    <div id="loja">
        <h2>LOJA (🍎 <span id="loja-saldo">0</span>)</h2>
        <div id="lista-cabecas"></div>
        <button onclick="voltarMenu()" style="background:#666">VOLTAR</button>
    </div>

    <div id="game-over-screen">
        <h2>FIM DE JOGO!</h2>
        <p id="score-atual"></p>
        <button onclick="reiniciar()">JOGAR DE NOVO</button>
        <button onclick="voltarMenu()" style="background:#666">MENU</button>
    </div>

    <div id="game-container">
        <div class="stats-topo">
            <span>🍎: <span id="ingame-score">0</span></span>
            <span>🏆: <span id="ingame-record">0</span></span>
        </div>
        <canvas id="snakeGame"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        let hackUsado = false;

        let dados = JSON.parse(localStorage.getItem('snakeEnzo')) || {
            totalMacas: 0, recorde: 0, cabecaAtual: '⚪', cabecasCompradas: ['⚪']
        };

        const cabecas = [
            {id: '⚪', preco: 0, nome: 'Padrão'},
            {id: '😎', preco: 10, nome: 'Estiloso'},
            {id: '🐍', preco: 10, nome: 'Cobra'},
            {id: '🤖', preco: 10, nome: 'Robô'},
            {id: '👑', preco: 20, nome: 'Rei'},
            {id: '🐱', preco: 30, nome: 'Gatinho'},
            {id: '👽', preco: 50, nome: 'Alien'}
        ];

        let cobra, fruta, direcao, placar, loop, tTile, tGrid, velocidade, corCorpo;

        function salvar() { localStorage.setItem('snakeEnzo', JSON.stringify(dados)); atualizarUI(); }
        function atualizarUI() {
            document.getElementById('total-maca').innerText = dados.totalMacas;
            document.getElementById('recorde').innerText = dados.recorde;
            document.getElementById('loja-saldo').innerText = dados.totalMacas;
        }

        function hack() {
            if(!hackUsado) {
                dados.totalMacas += 1000;
                alert("HACK: +1000 Maçãs! Vá na loja comprar suas cabeças.");
                hackUsado = true;
                salvar();
            }
        }

        function resetTotal() {
            if(confirm("CERTEZA QUE QUER APAGAR TODO O PROGRESSO?")) {
                dados = { totalMacas: 0, recorde: 0, cabecaAtual: '⚪', cabecasCompradas: ['⚪'] };
                salvar();
            }
        }

        function abrirLoja() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('loja').style.display = 'block';
            const lista = document.getElementById('lista-cabecas');
            lista.innerHTML = '';
            cabecas.forEach(c => {
                const comprou = dados.cabecasCompradas.includes(c.id);
                const selecionada = dados.cabecaAtual === c.id;
                lista.innerHTML += `
                    <div class="item-loja">
                        <span>${c.id} ${c.nome}</span>
                        <button onclick="acaoLoja('${c.id}', ${c.preco})" style="background: ${selecionada ? '#4caf50' : '#2196f3'}">
                            ${comprou ? (selecionada ? 'USANDO' : 'USAR') : c.preco + '🍎'}
                        </button>
                    </div>`;
            });
        }

        function acaoLoja(id, preco) {
            if(dados.cabecasCompradas.includes(id)) { dados.cabecaAtual = id; }
            else if(dados.totalMacas >= preco) {
                dados.totalMacas -= preco;
                dados.cabecasCompradas.push(id);
                dados.cabecaAtual = id;
            }
            salvar(); abrirLoja();
        }

        function configurarEIniciar() {
            tGrid = parseInt(document.getElementById('map-size').value);
            velocidade = parseInt(document.getElementById('speed').value);
            corCorpo = document.getElementById('snake-body-color').value;
            tTile = 360 / tGrid;
            canvas.width = canvas.height = 360;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            reiniciar();
        }

        function reiniciar() {
            document.getElementById('game-over-screen').style.display = 'none';
            cobra = [{x: Math.floor(tGrid/2), y: Math.floor(tGrid/2)}];
            direcao = 'D'; placar = 0;
            document.getElementById('ingame-score').innerText = 0;
            document.getElementById('ingame-record').innerText = dados.recorde;
            criarFruta();
            if(loop) clearInterval(loop);
            loop = setInterval(desenhar, velocidade);
        }

        function criarFruta() {
            fruta = { x: Math.floor(Math.random()*tGrid), y: Math.floor(Math.random()*tGrid) };
            if(cobra.some(p => p.x === fruta.x && p.y === fruta.y)) criarFruta();
        }

        document.addEventListener('keydown', e => {
            if(e.key==='ArrowUp' && direcao!=='B') direcao='C';
            if(e.key==='ArrowDown' && direcao!=='C') direcao='B';
            if(e.key==='ArrowLeft' && direcao!=='D') direcao='E';
            if(e.key==='ArrowRight' && direcao!=='E') direcao='D';
        });

        function desenhar() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,360,360);
            ctx.fillStyle = 'red'; ctx.beginPath();
            ctx.arc(fruta.x*tTile+tTile/2, fruta.y*tTile+tTile/2, tTile/2.5, 0, Math.PI*2); ctx.fill();

            let nx = cobra[0].x, ny = cobra[0].y;
            if(direcao==='D') nx++; if(direcao==='E') nx--; if(direcao==='C') ny--; if(direcao==='B') ny++;

            if(nx<0||nx>=tGrid||ny<0||ny>=tGrid||cobra.some(p=>p.x===nx && p.y===ny)) {
                clearInterval(loop);
                dados.totalMacas += placar;
                if(placar > dados.recorde) dados.recorde = placar;
                salvar();
                document.getElementById('score-atual').innerText = `Maçãs pegas: ${placar}`;
                document.getElementById('game-over-screen').style.display = 'block';
                return;
            }

            cobra.unshift({x:nx, y:ny});
            if(nx===fruta.x && ny===fruta.y) {
                placar++; document.getElementById('ingame-score').innerText = placar; criarFruta();
            } else { cobra.pop(); }

            cobra.forEach((p, i) => {
                if(i===0) {
                    ctx.font = `${tTile}px Arial`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(dados.cabecaAtual, p.x*tTile+tTile/2, p.y*tTile+tTile/2);
                } else {
                    ctx.fillStyle = corCorpo;
                    ctx.fillRect(p.x*tTile+1, p.y*tTile+1, tTile-2, tTile-2);
                }
            });
        }

        function voltarMenu() { document.getElementById('game-container').style.display = 'none'; document.getElementById('game-over-screen').style.display = 'none'; document.getElementById('loja').style.display = 'none'; document.getElementById('menu').style.display = 'block'; }
        atualizarUI();
    </script>
</body>
</html>
